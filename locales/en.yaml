home.hero.subtitle: Use Språkbanken's analyses and research platforms for your own language data
home.hero.sb: "{0} supports research by providing data and developing language technology analyses and research platforms."
home.hero.mink: "{0} lets you use those technology analyses and research platforms for data resources that you create yourself."
