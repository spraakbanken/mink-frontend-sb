home.features.title: What can I do with Mink?
home.features.upload: Upload your data in formats like Word, PDF and custom XML
home.features.annotations: Add automatic annotations like lemmatization, POS tagging, dependency parsing and NER
home.features.install: Install in Korp and Strix to unlock concordances, statistics, semantic visualization and more
home.features.lexicons: Create lexicons and install them in Karp to search and compare with other open lexicons
home.features.privacy: Your resources are private to you and those you explicitly invite. Get in touch if you want to contribute your data to the research community!
home.features.code: We take pride in providing free and open access where possible, and that includes source code. Check out our {repos} to examine or contribute, and learn how to set up a Mink instance for your own organisation!
